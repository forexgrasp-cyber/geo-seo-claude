<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Video Factory</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .card.selected {
            background: rgba(255, 255, 255, 0.3);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        .card h3 {
            margin-bottom: 0.5rem;
            color: #ffd700;
        }
        .card p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .card .tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }
        .action-bar {
            background: rgba(0, 0, 0, 0.3);
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
        }
        .btn {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #000;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 1rem;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            margin-top: 1rem;
            font-size: 1.1rem;
        }
        .prompt-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Hero Video Factory</h1>
        
        <div class="grid" id="hero-grid">
            <!-- Heroes will be loaded here -->
        </div>
        
        <div class="grid" id="series-grid">
            <!-- Series will be loaded here -->
        </div>
        
        <div class="action-bar">
            <h2 id="selection-status">Select a hero and series to begin</h2>
            <button class="btn" id="generate-btn" disabled onclick="generateVideo()">
                🚀 Generate Video Config
            </button>
            <div class="status" id="status"></div>
            <div class="prompt-box" id="prompt-output" style="display: none;"></div>
        </div>
    </div>

    <script>
        let registry = {};
        let selectedHero = null;
        let selectedSeries = null;

        async function loadRegistry() {
            try {
                const response = await fetch('../hero-registry.json');
                registry = await response.json();
                renderHeroes();
                renderSeries();
            } catch (error) {
                console.error('Error loading registry:', error);
                document.getElementById('status').innerText = 'Error loading hero registry';
            }
        }

        function renderHeroes() {
            const grid = document.getElementById('hero-grid');
            grid.innerHTML = registry.heroes.map(hero => `
                <div class="card" onclick="selectHero('${hero.id}')">
                    <h3>${hero.name}</h3>
                    <p>${hero.description}</p>
                    <div class="tag">${hero.style}</div>
                    <div class="tag">${hero.motion}</div>
                </div>
            `).join('');
        }

        function renderSeries() {
            const grid = document.getElementById('series-grid');
            grid.innerHTML = registry.series.map(series => `
                <div class="card" onclick="selectSeries('${series.id}')">
                    <h3>${series.name}</h3>
                    <p>${series.description}</p>
                    <div class="tag">Duration: ${series.duration}s</div>
                    <div class="tag">Music: ${series.musicStyle}</div>
                </div>
            `).join('');
        }

        function selectHero(heroId) {
            selectedHero = registry.heroes.find(h => h.id === heroId);
            updateSelection();
            document.querySelectorAll('#hero-grid .card').forEach(card => {
                card.classList.remove('selected');
                if (card.querySelector('h3').innerText === selectedHero.name) {
                    card.classList.add('selected');
                }
            });
        }

        function selectSeries(seriesId) {
            selectedSeries = registry.series.find(s => s.id === seriesId);
            updateSelection();
            document.querySelectorAll('#series-grid .card').forEach(card => {
                card.classList.remove('selected');
                if (card.querySelector('h3').innerText === selectedSeries.name) {
                    card.classList.add('selected');
                }
            });
        }

        function updateSelection() {
            const status = document.getElementById('selection-status');
            const btn = document.getElementById('generate-btn');
            
            if (selectedHero && selectedSeries) {
                status.innerText = `Ready: ${selectedHero.name} in ${selectedSeries.name}`;
                btn.disabled = false;
            } else {
                status.innerText = 'Select a hero and series to begin';
                btn.disabled = true;
            }
        }

        async function generateVideo() {
            if (!selectedHero || !selectedSeries) return;
            
            const status = document.getElementById('status');
            const promptOutput = document.getElementById('prompt-output');
            
            status.innerText = 'Generating configuration...';
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        hero: selectedHero.id,
                        series: selectedSeries.id
                    })
                });
                
                const result = await response.json();
                
                promptOutput.style.display = 'block';
                promptOutput.innerHTML = `
                    <strong>Generated Configuration:</strong><br>
                    Hero: ${selectedHero.name}<br>
                    Series: ${selectedSeries.name}<br>
                    Duration: ${selectedSeries.duration}s<br><br>
                    <strong>AI Video Prompt:</strong><br>
                    ${selectedHero.videoPrompt}<br><br>
                    <strong>Next Steps:</strong><br>
                    1. Use the prompt above in Kling AI or Runway<br>
                    2. Download generated video<br>
                    3. Place in public/assets/videos/<br>
                    4. Run: npx remotion render MyComposition out/${selectedHero.id}-${selectedSeries.id}.mp4
                `;
                
                status.innerText = '✓ Configuration generated! Check prompts below.';
            } catch (error) {
                status.innerText = 'Error generating configuration';
                console.error(error);
            }
        }

        // Load registry on page load
        loadRegistry();
    </script>
</body>
</html>
